name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up aube + Node.js
        uses: endevco/aube-action@v1
        with:
          node-version: "lts/*"

      - name: Install dependencies (frozen lockfile)
        run: aube ci

      - name: Check formatting
        run: aube run format:check

      - name: Run linter
        run: aube run lint

      - name: Build
        run: aube run build

      - name: Run tests
        run: aube run test:run

      - name: Verify version tracks SDK
        run: aube run sync-sdk-version -- --check
