name: Publish to npm
# Manual / tag-driven publish. This fork's versioning is SDK-mirrored
# (see README "Versioning"), so the upstream release-please flow no
# longer applies — push a `v<SDK-version>[-N]` tag, or trigger manually,
# to release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up aube + Node.js
        uses: endevco/aube-action@v1
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - run: aube ci
      - run: aube run sync-sdk-version -- --check
      - run: aube run build
      - run: aube publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
